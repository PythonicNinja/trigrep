name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked -p trigrep-cli --bin trigrep --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/trigrep" dist/package/
          chmod +x dist/package/trigrep
          cp README.md dist/package/
          asset_name="trigrep-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -C dist/package -czf "dist/${asset_name}" trigrep README.md
          echo "ASSET_PATH=dist/${asset_name}" >> "$GITHUB_ENV"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist, dist\package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/trigrep.exe" "dist/package/trigrep.exe"
          Copy-Item "README.md" "dist/package/README.md"
          $assetName = "trigrep-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "dist/package/*" -DestinationPath "dist/$assetName" -Force
          "ASSET_PATH=dist/$assetName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
